apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartfleet-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smartfleet-gateway
  template:
    metadata:
      labels:
        app: smartfleet-gateway
    spec:
      containers:
      - name: gateway
        image: yourdockerhubusername/smartfleet-gateway:latest
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "128Mi"
            cpu: "125m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5